version: "2"

# This file contains all available configuration options
# with their default values.

# options for analysis running
run:

  # default concurrency is a available CPU number
  #  concurrency: 4

  # timeout for analysis, e.g. 30s, 5m, default is 1m
  #  deadline: 1m

  # exit code when at least one issue was found, default is 1
  #  issues-exit-code: 1

  # include test files or not, default is true
  tests: true

  # list of build tags, all linters use it. Default is empty list.
  #  build-tags:
  #    - mytag

  # which dirs to skip: they won't be analyzed;
  # can use regexp here: generated.*, regexp is applied on full path;
  # default value is empty list, but next dirs are always skipped independently
  # of this option's value:
  #   	vendor$, third_party$, testdata$, examples$, Godeps$, builtin$
  #  skip-dirs:
  #    - src/external_libs
  #    - autogenerated_by_my_lib

  # which files to skip: they will be analyzed, but issues from them
  # won't be reported. Default value is empty list, but there is
  # no need to include all autogenerated files, we confidently recognize
  # autogenerated files. If it's not please let us know.
  #  skip-files:
  #    - ".*\\.my\\.go$"
  #    - lib/bad.go

  # by default isn't set. If set we pass it to "go list -mod={option}". From "go help modules":
  # If invoked with -mod=readonly, the go command is disallowed from the implicit
  # automatic updating of go.mod described above. Instead, it fails when any changes
  # to go.mod are needed. This setting is most useful to check that go.mod does
  # not need updates, such as in a continuous integration and testing system.
  # If invoked with -mod=vendor, the go command assumes that the vendor
  # directory holds the correct copies of dependencies and ignores
  # the dependency descriptions in go.mod.
  modules-download-mode: vendor

linters:
  # to try out individual linters: golangci-lint run -E gocyclo,gosimple
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    # - containedctx
    # - contextcheck
    - copyloopvar
    # - cyclop
    - decorder
    - depguard
    - dogsled
    # - dupl
    - dupword
    - durationcheck
    # - embeddedstructfieldcheck
    # - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    # - exhaustive
    # - exhaustruct
    - exptostd
    # - fatcontext
    - forbidigo
    # - forcetypeassert
    - funcorder
    # - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    # - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    # - gocognit
    - goconst
    - gocritic
    # - gocyclo
    # - godoclint
    # - godot
    # - godox
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    # - lll
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    #- mnd
    - modernize
    # - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    # - noinlineerr
    - nolintlint
    # - nonamedreturns
    - nosprintfhostport
    # - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    # - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    # - tagalign
    # - tagliatelle
    - testableexamples
    - testifylint
    # - testpackage
    # - thelper
    # - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    # - varnamelen
    - wastedassign
    - whitespace
    # - wrapcheck
    - wsl_v5
    - zerologlint

  disable:
    - staticcheck

  settings:
    govet:
      enable:
        - appends
        - asmdecl
        - assign
        - atomic
        - atomicalign
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - deepequalerrors
        - defers
        - directive
        - errorsas
        # - fieldalignment
        - findcall
        - framepointer
        - httpresponse
        - ifaceassert
        - loopclosure
        - lostcancel
        - nilfunc
        - nilness
        - printf
        - reflectvaluecompare
        - shift
        - sigchanyzer
        - slog
        - sortslice
        - stdmethods
        - stdversion
        - stringintconv
        - structtag
        - shadow
        - testinggoroutine
        - tests
        - timeformat
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
        - unusedwrite
        - waitgroup

    copyloopvar:
      # Check all assigning the loop variable to another variable.
      # Default: false
      check-alias: true

    depguard:
      rules:
        all:
          files:
            - $all
          deny:
            - pkg: github.com/magiconair/properties/assert
              desc: Use testify/assert package instead
            - pkg: gopkg.in/go-playground/assert.v1
            - pkg: github.com/pborman/uuid
              desc: replace with github.com/google/uuid
        main:
          files:
            - '!$test'
          deny:
            - pkg: github.com/davecgh/go-spew/spew
              desc: spew is usually only used in tests
            - pkg: github.com/stretchr/testify
              desc: testify is usually only used in tests

    gocyclo:
      min-complexity: 10

    dupl:
      threshold: 100

    interfacebloat:
      max: 15

    misspell:
      locale: US

    prealloc:
      for-loops: true
      range-loops: true
      simple: true

    unparam:
      # Inspect exported functions, default is false. Set to true if no external program/library imports your code.
      # XXX: if you enable this setting, unparam will report a lot of false-positives in text editors:
      # if it's called for subdir of a project it can't find external interfaces. All text editor integrations
      # with golangci-lint call it on a directory with the changed file.
      check-exported: false

    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: true
      enable:
        - assign
        - branch
        - decl
        - defer
        - expr
        - for
        - go
        - if
        - inc-dec
        - label
        - range
        - return
        - select
        - send
        - switch
        - type-switch
        - append
        - assign-exclusive
        - assign-expr
        - err
        - leading-whitespace
        - trailing-whitespace

  exclusions:
    rules:
      - linters:
          - cyclop
          - errname
          - gocognit
          - goconst
          - gocyclo
          - gosec
          - gosmopolitan
          - funlen
          - maintidx
          - nolintlint
          - prealloc
          - wsl_v5
        path: _test\.go

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    # - golines